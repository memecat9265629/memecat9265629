<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Script Editor & Super Chaotic Evil Obfuscator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #282c34;
            color: white;
        }
        textarea {
            width: 80%;
            height: 200px;
            margin: 10px 0;
            padding: 10px;
            background: #1e1e1e;
            color: #fff;
            border: none;
            outline: none;
            font-size: 14px;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            background: #61dafb;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }
        button:hover {
            background: #21a1f1;
        }
        input[type="file"] {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h2>Roblox Script Editor & Super Chaotic Evil Obfuscator</h2>
    <input type="file" id="fileInput" accept=".txt">
    <textarea id="scriptInput" placeholder="Paste your script here..."></textarea>
    <button onclick="obfuscateScript()">Obfuscate</button>
    <button onclick="copyObfuscated()">Copy Obfuscated Script</button>
    <button onclick="downloadObfuscated()">Download Obfuscated Script</button>
    <textarea id="obfuscatedOutput" readonly placeholder="Obfuscated script will appear here..."></textarea>
    
    <script>
        document.getElementById("fileInput").addEventListener("change", function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById("scriptInput").value = e.target.result;
                };
                reader.readAsText(file);
            }
        });

        function obfuscateScript() {
            let input = document.getElementById("scriptInput").value;
            let obfuscated = input.split('').map(char => `\"${char.charCodeAt(0)}\"`).join("..") + "..";
            let finalScript = `local function evil() local _ = {${obfuscated}} local s='' for i=1,#_ do s=s..string.char(tonumber(_[i])) end loadstring(s)() end evil();`;
            document.getElementById("obfuscatedOutput").value = finalScript;
        }
        
        function copyObfuscated() {
            let output = document.getElementById("obfuscatedOutput");
            output.select();
            document.execCommand("copy");
            alert("Super Chaotic Evil Obfuscated script copied!");
        }
        
        function downloadObfuscated() {
            let obfuscatedScript = document.getElementById("obfuscatedOutput").value;
            let blob = new Blob([obfuscatedScript], { type: "text/plain" });
            let a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "obfuscated_script.txt";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
