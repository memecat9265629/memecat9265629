<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Script Editor & Super Chaotic Obfuscator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #282c34;
            color: white;
        }
        textarea {
            width: 80%;
            height: 200px;
            margin: 10px 0;
            padding: 10px;
            background: #1e1e1e;
            color: #fff;
            border: none;
            outline: none;
            font-size: 14px;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            background: #61dafb;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }
        button:hover {
            background: #21a1f1;
        }
    </style>
</head>
<body>
    <h2>Roblox Script Editor & Super Chaotic Obfuscator</h2>
    <textarea id="scriptInput" placeholder="Paste your script here..."></textarea>
    <button onclick="obfuscateScript()">Obfuscate</button>
    <button onclick="copyObfuscated()">Copy Obfuscated Script</button>
    <textarea id="obfuscatedOutput" readonly placeholder="Obfuscated script will appear here..."></textarea>
    
    <script>
        function generateJunkCode() {
            let junk = "";
            for (let i = 0; i < 10; i++) {
                junk += `local var${Math.random().toString(36).substring(7)} = ${Math.random()}\n`;
            }
            return junk;
        }
        
        function shuffleString(str) {
            return str.split('').sort(() => Math.random() - 0.5).join('');
        }
        
        function obfuscateScript() {
            let input = document.getElementById("scriptInput").value;
            let junkCode = generateJunkCode();
            let shuffled = shuffleString(input); // Chaotic shuffling
            let encoded = btoa(junkCode + shuffled + junkCode); // Double junk with base64
            let finalScript = `local function x() loadstring(game:HttpGet("${encoded}"))() end x();`;
            document.getElementById("obfuscatedOutput").value = finalScript;
        }
        
        function copyObfuscated() {
            let output = document.getElementById("obfuscatedOutput");
            output.select();
            document.execCommand("copy");
            alert("Super Chaotic Obfuscated script copied!");
        }
    </script>
</body>
</html>
